<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <div class="rounded-xl border border-indigo-500/20 bg-slate-900/70 p-6">
            <h1 class="text-2xl font-semibold">Update My Event</h1>
            <p class="text-sm text-slate-400 mt-1">{{ event['event_name'] }}</p>

            <form action="/api/user_update_event/{{ event['event_id'] }}" method="POST" class="mt-6 space-y-4">
                <div>
                    <label class="text-xs uppercase tracking-wide text-slate-400">Date</label>
                    <input type="date" name="date" value="{{ event['date'] }}" required class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950/80 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400/30">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-wide text-slate-400">Time</label>
                    <input type="time" name="time" value="{{ event['time'] }}" required class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950/80 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400/30">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-wide text-slate-400">Location</label>
                    <input type="text" name="location" value="{{ event['location'] }}" required class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950/80 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400/30">
                </div>
                <button type="submit" class="w-full rounded-lg bg-indigo-500 py-2.5 hover:bg-indigo-400 transition">Update Event</button>
            </form>
        </div>

        <a href="/api/view_events" class="inline-block mt-4 text-indigo-300 hover:text-indigo-200">Back to Event List</a>
    </div>
</body>
</html>
